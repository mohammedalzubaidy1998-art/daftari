<script>
window.storage = {
  get: async (key) => {
    const raw = localStorage.getItem(key);
    if (raw === null) throw new Error("not found");
    return { key, value: raw };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
    return { keys, prefix };
  },
};

@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');

.app {
  --bg: #14171c;
  --surface: #1b1f26;
  --surface-2: #232830;
  --line: #2d333d;
  --gold: #c9a227;
  --gold-soft: #e0c264;
  --ink: #ece8de;
  --muted: #8a8f98;
  --good: #5fa379;
  --bad: #c0584f;
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  width: 100%;
}
.app * { box-sizing: border-box; }
.app button, .app input, .app select { font-family: inherit; }
.app :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; width: 100%; height: 100vh; color: var(--muted);
}
.spin { animation: spin 1s linear infinite; color: var(--gold); }
@keyframes spin { to { transform: rotate(360deg); } }

.sidebar {
  width: 230px; flex-shrink: 0; background: var(--surface);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column; padding: 20px 14px;
  height: 100vh; position: sticky; top: 0;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px; }
.brand-mark {
  font-family: 'Amiri', serif; font-size: 22px; color: var(--bg); background: var(--gold);
  width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.brand-title { font-family: 'Amiri', serif; font-size: 17px; font-weight: 700; color: var(--ink); }
.brand-sub { font-size: 11px; color: var(--muted); }

.nav { display: flex; flex-direction: column; gap: 3px; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
  background: transparent; border: none; color: var(--muted); font-size: 14px; cursor: pointer;
  text-align: right; transition: background .15s, color .15s;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--surface-2); color: var(--gold-soft); font-weight: 700; }

.settings-card { max-width: 560px; }
.settings-desc { color: var(--muted); font-size: 13px; line-height: 1.7; margin: 0 0 16px; }
.settings-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.danger-zone { border-color: #c0584f55; }
.danger-title { color: var(--bad) !important; }
.btn-danger { background: transparent; border: 1px solid var(--bad); color: var(--bad); }
.btn-danger:hover { background: var(--bad); color: #fff; }

.reset-btn {
  display: flex; align-items: center; gap: 6px; justify-content: center;
  background: transparent; border: 1px solid var(--line); color: var(--muted);
  padding: 9px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 8px;
}
.reset-btn:hover { color: var(--gold-soft); border-color: var(--gold); }
.reset-btn.danger:hover { color: var(--bad); border-color: var(--bad); }

.content { flex: 1; padding: 28px 34px; max-width: 1150px; overflow-x: hidden; }
.page-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.page-title { font-family: 'Amiri', serif; font-size: 26px; font-weight: 700; margin: 0 0 4px; color: var(--ink); }
.page-sub { color: var(--muted); font-size: 13.5px; margin: 0 0 22px; }
.section-title { font-family: 'Amiri', serif; font-size: 16px; color: var(--gold-soft); margin: 22px 0 10px; }

.card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
  padding: 18px; margin-bottom: 18px;
}
.card-title { font-family: 'Amiri', serif; font-size: 18px; margin: 0 0 14px; color: var(--gold-soft); }

.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
.stat-card.good { border-color: var(--good); }
.stat-card.bad { border-color: var(--bad); }
.stat-value { font-family: 'IBM Plex Mono', monospace; direction: ltr; font-size: 22px; font-weight: 600; color: var(--gold-soft); }
.stat-suffix { font-family: 'Tajawal', sans-serif; font-size: 12px; color: var(--muted); }
.stat-label { font-size: 12.5px; color: var(--muted); margin-top: 4px; }

.balance-check-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.balance-status {
  display: flex; align-items: center; gap: 7px; font-size: 13.5px; padding: 9px 0 0; font-weight: 700;
}
.balance-status.ok { color: var(--good); }
.balance-status.off { color: var(--bad); }
.balance-status.standalone { padding: 4px 4px; }

.form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.input {
  background: var(--surface-2); border: 1px solid var(--line); color: var(--ink);
  border-radius: 8px; padding: 9px 12px; font-size: 13.5px; flex: 1; min-width: 140px;
}
.input.small { flex: none; width: 120px; }
.error-text { color: var(--bad); font-size: 12.5px; margin: -8px 0 14px; }

.btn {
  display: flex; align-items: center; gap: 6px; border: none; border-radius: 8px;
  padding: 9px 16px; font-size: 13.5px; cursor: pointer; font-weight: 700;
}
.btn-primary { background: var(--gold); color: #1c1c1c; }
.btn-primary:hover { background: var(--gold-soft); }
.btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold-soft); }

.table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.table th { text-align: right; color: var(--muted); font-weight: 500; font-size: 12px; padding: 8px 10px; border-bottom: 1px solid var(--line); }
.table td { padding: 9px 10px; border-bottom: 1px solid var(--line); }
.table tbody tr:hover { background: var(--surface-2); }
.table tfoot td { padding-top: 12px; font-weight: 700; }
.num { font-family: 'IBM Plex Mono', monospace; direction: ltr; display: inline-block; }
.double-rule { border-top: 3px double var(--gold); padding-top: 8px !important; color: var(--gold-soft); }
.muted { color: var(--muted); }
.small-text { font-size: 11.5px; }
.empty { text-align: center; color: var(--muted); padding: 24px !important; }

.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 18px; }
.filter-bar.sub { margin-top: -10px; padding-right: 4px; }
.filter-chip {
  background: var(--surface); border: 1px solid var(--line); color: var(--muted);
  padding: 7px 16px; border-radius: 20px; font-size: 12.5px; cursor: pointer; font-weight: 700;
  transition: all .15s;
}
.filter-chip.sub-chip { padding: 5px 13px; font-size: 11.5px; font-weight: 500; border-style: dashed; }
